<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login — MIU Bus System" />
  <title>Login — MIU Bus System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../../assets/css/login.css" />
</head>

<body>

  <nav class="navbar">
    <div class="nav-brand">
      <div class="nav-brand__icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M4 16c0 .88.39 1.67 1 2.22V20a1 1 0 001 1h1a1 1 0 001-1v-1h8v1a1 1 0 001 1h1a1 1 0 001-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4s-8 .5-8 4v10zm3.5 1a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm9 0a1.5 1.5 0 110-3 1.5 1.5 0 010 3zM6 6h12v5H6V6z" />
        </svg>
      </div>
      <span class="nav-brand__text">MIU Bus System</span>
    </div>
    <a href="../../index.html" class="nav-link">Home</a>
  </nav>

  <main class="login-container">
    <div class="login-card">

      <h1 class="login-card__title">Welcome Back!</h1>
      <p class="login-card__subtitle">Login to continue</p>

      <div class="form-error" id="form-error" role="alert" aria-live="polite"></div>

      <form id="login-form" novalidate>

        <div class="form-group">
          <label class="form-group__label" for="login-email">Email</label>
          <div class="input-wrap">
            <span class="input-wrap__icon">
              <svg viewBox="0 0 24 24">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </span>
            <input class="input-field" type="email" id="login-email" name="email" placeholder="Enter your email"
              autocomplete="email" aria-describedby="email-error" />
          </div>
          <div class="field-error" id="email-error" role="alert"></div>
        </div>

        <div class="form-group">
          <label class="form-group__label" for="login-password">Password</label>
          <div class="input-wrap">
            <span class="input-wrap__icon">
              <svg viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" />
                <path d="M7 11V7a5 5 0 0110 0v4" />
              </svg>
            </span>
            <input class="input-field" type="password" id="login-password" name="password"
              placeholder="Enter your password" autocomplete="current-password" aria-describedby="password-error" />
            <button type="button" class="toggle-pw" id="toggle-pw-btn" aria-label="Toggle password visibility">
              <svg id="toggle-password-icon" viewBox="0 0 24 24">
                <path
                  d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>
          <div class="field-error" id="password-error" role="alert"></div>
        </div>

        <div class="form-row">
          <label class="form-row__remember">
            <input type="checkbox" id="remember-me" name="remember" />
            <span>Remember me</span>
          </label>
          <a href="#" class="form-row__forgot" id="forgot-password-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-primary" id="login-submit-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
            <polyline points="10 17 15 12 10 7" />
            <line x1="15" y1="12" x2="3" y2="12" />
          </svg>
          Login
        </button>

      </form>

    </div>
  </main>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/pages/login-page.js"></script>
</body>

</html>
